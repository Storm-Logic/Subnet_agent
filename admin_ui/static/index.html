<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subnet Bot Admin</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f; --surface: #111418; --surface2: #181c22;
    --border: #242930; --border2: #2e3640;
    --accent: #00d4aa; --accent2: #0099ff;
    --text: #c8d4e0; --text2: #7a8fa6; --text3: #3d4f61;
    --green: #00d4aa; --red: #ff4757; --warn: #ff6b35;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 32px 32px; opacity: 0.25;
  }
  #app { position: relative; z-index: 1; max-width: 1060px; margin: 0 auto; padding: 0 24px 80px; }

  header { display: flex; align-items: center; justify-content: space-between; padding: 28px 0 22px; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-hex { width: 34px; height: 34px; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Mono', monospace; font-size: 15px; color: var(--accent); position: relative; }
  .logo-hex::before { content: ''; position: absolute; inset: 3px; background: var(--accent); opacity: 0.08; }
  h1 { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 500; letter-spacing: 0.06em; color: var(--text); }
  h1 span { color: var(--text2); font-weight: 400; }

  /* Auth */
  #auth { display: flex; align-items: center; justify-content: center; min-height: 68vh; }
  .auth-card { background: var(--surface); border: 1px solid var(--border2); padding: 36px 40px; width: 330px; }
  .auth-card h2 { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 20px; }
  #auth-err { color: var(--red); font-family: 'IBM Plex Mono', monospace; font-size: 11px; margin-top: 10px; display: none; }

  /* Status bar */
  #status-bar { display: flex; gap: 28px; background: var(--surface); border: 1px solid var(--border); padding: 12px 18px; margin-bottom: 26px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; flex-wrap: wrap; }
  .stat { display: flex; align-items: center; gap: 7px; color: var(--text2); }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-g { background: var(--green); box-shadow: 0 0 5px var(--green); }
  .dot-w { background: var(--warn); box-shadow: 0 0 5px var(--warn); }
  .dot-d { background: var(--text3); }
  .stat-v { color: var(--text); }

  /* Tabs */
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 22px; }
  .tab { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 9px 18px; cursor: pointer; color: var(--text2); border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.12s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Panel */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Section header */
  .sec-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .sec-title { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text2); letter-spacing: 0.1em; text-transform: uppercase; }

  /* Form */
  .add-form { background: var(--surface); border: 1px solid var(--border); padding: 18px; margin-bottom: 18px; display: none; animation: sd 0.14s ease; }
  .add-form.open { display: block; }
  @keyframes sd { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  .frow { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .frow:last-child { margin-bottom: 0; }
  .fg { display: flex; flex-direction: column; flex: 1; min-width: 140px; }
  label.lbl { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.09em; text-transform: uppercase; margin-bottom: 4px; }

  input, textarea {
    background: var(--bg); border: 1px solid var(--border2); color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; padding: 8px 11px;
    outline: none; transition: border-color 0.12s; width: 100%;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  input::placeholder, textarea::placeholder { color: var(--text3); }
  textarea { resize: vertical; min-height: 80px; }

  /* Buttons */
  .btn { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.06em; padding: 8px 16px; cursor: pointer; border: 1px solid; background: none; transition: all 0.12s; white-space: nowrap; }
  .btn-p { border-color: var(--accent); color: var(--accent); }
  .btn-p:hover { background: var(--accent); color: var(--bg); }
  .btn-g { border-color: var(--border2); color: var(--text2); }
  .btn-g:hover { border-color: var(--text); color: var(--text); }
  .btn-del { border-color: transparent; color: var(--text3); padding: 5px 9px; font-size: 10px; }
  .btn-del:hover { border-color: var(--red); color: var(--red); }
  .btn-edt { border-color: transparent; color: var(--text3); padding: 5px 9px; font-size: 10px; }
  .btn-edt:hover { border-color: var(--accent2); color: var(--accent2); }

  /* Item cards */
  .list { display: flex; flex-direction: column; gap: 2px; }
  .card { background: var(--surface); border: 1px solid var(--border); padding: 13px 15px; display: flex; align-items: flex-start; gap: 10px; transition: border-color 0.12s; }
  .card:hover { border-color: var(--border2); }
  .card-body { flex: 1; min-width: 0; }
  .card-label { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
  .card-url { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--accent2); text-decoration: none; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
  .card-url:hover { text-decoration: underline; }
  .card-desc { font-size: 12px; color: var(--text2); margin-bottom: 2px; }
  .card-q { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .card-a { font-size: 12px; color: var(--text2); line-height: 1.65; white-space: pre-wrap; }
  .card-meta { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); margin-top: 5px; }
  .tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
  .tag { font-family: 'IBM Plex Mono', monospace; font-size: 10px; padding: 2px 7px; background: var(--surface2); border: 1px solid var(--border2); color: var(--text2); }
  .card-actions { display: flex; gap: 2px; flex-shrink: 0; }

  /* Inline edit */
  .edit-form { background: var(--surface2); border: 1px solid var(--border2); padding: 13px; margin-top: 9px; display: none; }
  .edit-form.open { display: block; }

  /* Empty */
  .empty { text-align: center; padding: 44px 0; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text3); border: 1px dashed var(--border); }

  /* Miner table */
  .mt { width: 100%; border-collapse: collapse; font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  .mt th { text-align: left; padding: 9px 13px; color: var(--text3); font-size: 10px; letter-spacing: 0.09em; text-transform: uppercase; border-bottom: 1px solid var(--border); background: var(--surface); }
  .mt td { padding: 9px 13px; border-bottom: 1px solid var(--border); color: var(--text2); }
  .mt tr:hover td { background: var(--surface); }
  .mt .r1 td:first-child { color: var(--green); }
  .mt .r2 td:first-child { color: var(--accent2); }
  .mt .r3 td:first-child { color: #a78bfa; }
  .sv { color: var(--text); }

  /* Toast */
  #toast { position: fixed; bottom: 22px; right: 22px; background: var(--surface2); border: 1px solid var(--border2); border-left: 3px solid var(--accent); padding: 11px 16px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text); z-index: 999; opacity: 0; transform: translateY(6px); transition: all 0.18s; pointer-events: none; }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.err { border-left-color: var(--red); }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-hex">⬡</div>
      <h1>SUBNET BOT <span>/ admin</span></h1>
    </div>
    <button class="btn btn-g" id="logout-btn" onclick="logout()" style="display:none">LOGOUT</button>
  </header>

  <!-- Auth -->
  <div id="auth">
    <div class="auth-card">
      <h2>// admin access</h2>
      <div class="fg">
        <label class="lbl">Admin Token</label>
        <input type="password" id="tok" placeholder="enter token" onkeydown="if(event.key==='Enter')login()">
      </div>
      <div style="margin-top:13px"><button class="btn btn-p" onclick="login()" style="width:100%">AUTHENTICATE</button></div>
      <div id="auth-err">invalid token</div>
    </div>
  </div>

  <!-- Main -->
  <div id="main" style="display:none">
    <div id="status-bar">
      <div class="stat"><div class="dot" id="wb-dot"></div><span>wandb</span><span class="stat-v" id="wb-ts">—</span></div>
      <div class="stat"><div class="dot dot-d" id="runs-dot"></div><span>active runs</span><span class="stat-v" id="wb-runs">—</span></div>
      <div class="stat"><div class="dot dot-g"></div><span>links</span><span class="stat-v" id="lc">—</span></div>
      <div class="stat"><div class="dot dot-g"></div><span>q&amp;a pairs</span><span class="stat-v" id="qc">—</span></div>
      <div class="stat"><div class="dot dot-g"></div><span>information</span><span class="stat-v" id="ic">—</span></div>
      <div class="stat"><div class="dot dot-g"></div><span>announcements</span><span class="stat-v" id="ac">—</span></div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="tab('links',this)">Reference Links</button>
      <button class="tab" onclick="tab('qa',this)">Manual Q&amp;A</button>
      <button class="tab" onclick="tab('information',this)">Information</button>
      <button class="tab" onclick="tab('announcements',this)">Announcements</button>
      <button class="tab" onclick="tab('miners',this)">Miner Data</button>
    </div>

    <!-- Links -->
    <div class="panel active" id="panel-links">
      <div class="sec-hd">
        <span class="sec-title">// reference links</span>
        <button class="btn btn-p" onclick="tf('lf')">+ ADD LINK</button>
      </div>
      <div class="add-form" id="lf">
        <div class="frow">
          <div class="fg" style="max-width:160px"><label class="lbl">Label</label><input id="lf-lb" placeholder="GitHub, wandb, Docs…"></div>
          <div class="fg"><label class="lbl">URL</label><input id="lf-url" placeholder="https://…"></div>
        </div>
        <div class="frow"><div class="fg"><label class="lbl">Description (shown to bot)</label><input id="lf-desc" placeholder="e.g. Source code and setup guide"></div></div>
        <div class="frow" style="justify-content:flex-end"><button class="btn btn-g" onclick="tf('lf')">CANCEL</button><button class="btn btn-p" onclick="submitLink()">SAVE</button></div>
      </div>
      <div class="list" id="links-list"></div>
    </div>

    <!-- Q&A -->
    <div class="panel" id="panel-qa">
      <div class="sec-hd">
        <span class="sec-title">// manual q&amp;a</span>
        <button class="btn btn-p" onclick="tf('qf')">+ ADD Q&amp;A</button>
      </div>
      <div class="add-form" id="qf">
        <div class="frow"><div class="fg"><label class="lbl">Question</label><input id="qf-q" placeholder="What are the device requirements for miners?"></div></div>
        <div class="frow"><div class="fg"><label class="lbl">Answer</label><textarea id="qf-a" placeholder="Full answer…"></textarea></div></div>
        <div class="frow"><div class="fg"><label class="lbl">Tags (comma-separated)</label><input id="qf-t" placeholder="setup, miner, hardware"></div></div>
        <div class="frow" style="justify-content:flex-end"><button class="btn btn-g" onclick="tf('qf')">CANCEL</button><button class="btn btn-p" onclick="submitQA()">SAVE</button></div>
      </div>
      <div class="list" id="qa-list"></div>
    </div>

    <!-- Information -->
    <div class="panel" id="panel-information">
      <div class="sec-hd">
        <span class="sec-title">// information</span>
        <button class="btn btn-p" onclick="tf('if')">+ ADD INFORMATION</button>
      </div>
      <div class="add-form" id="if">
        <div class="frow"><div class="fg"><label class="lbl">Body</label><textarea id="if-body" placeholder="Information text..."></textarea></div></div>
        <div class="frow" style="justify-content:flex-end"><button class="btn btn-g" onclick="tf('if')">CANCEL</button><button class="btn btn-p" onclick="submitInformation()">SAVE</button></div>
      </div>
      <div class="list" id="information-list"></div>
    </div>

    <!-- Announcements -->
    <div class="panel" id="panel-announcements">
      <div class="sec-hd">
        <span class="sec-title">// announcements</span>
        <button class="btn btn-p" onclick="tf('af')">+ ADD ANNOUNCEMENT</button>
      </div>
      <div class="add-form" id="af">
        <div class="frow"><div class="fg"><label class="lbl">Title</label><input id="af-title" placeholder="Network update, validator notice, launch note"></div></div>
        <div class="frow"><div class="fg"><label class="lbl">Body</label><textarea id="af-body" placeholder="Announcement text..."></textarea></div></div>
        <div class="frow">
          <label style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2);display:flex;align-items:center;gap:7px">
            <input type="checkbox" id="af-active" checked style="width:auto"> ACTIVE
          </label>
        </div>
        <div class="frow" style="justify-content:flex-end"><button class="btn btn-g" onclick="tf('af')">CANCEL</button><button class="btn btn-p" onclick="submitAnnouncement()">SAVE</button></div>
      </div>
      <div class="list" id="announcements-list"></div>
    </div>

    <!-- Miners -->
    <div class="panel" id="panel-miners">
      <div class="sec-hd">
        <span class="sec-title">// live miner data (wandb)</span>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3)">auto-refreshes every 5 min</span>
      </div>
      <table class="mt">
        <thead><tr><th>RANK</th><th>UID</th><th>AVG SCORE</th><th>LAST SCORE</th><th>RECORDS</th></tr></thead>
        <tbody id="mt-body"><tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text3)">loading…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
let T = sessionStorage.getItem('at') || '';

// ── Auth ──────────────────────────────────────────────────────────────────────
async function login() {
  T = document.getElementById('tok').value.trim();
  try { await api('GET','/api/status'); sessionStorage.setItem('at',T); showMain(); loadAll(); }
  catch { document.getElementById('auth-err').style.display='block'; T=''; }
}
function logout() {
  sessionStorage.removeItem('at'); T='';
  document.getElementById('main').style.display='none';
  document.getElementById('auth').style.display='flex';
  document.getElementById('logout-btn').style.display='none';
  document.getElementById('auth-err').style.display='none';
  document.getElementById('tok').value='';
}
function showMain() {
  document.getElementById('auth').style.display='none';
  document.getElementById('main').style.display='block';
  document.getElementById('logout-btn').style.display='';
}
if(T) api('GET','/api/status').then(()=>{showMain();loadAll();}).catch(()=>{T='';});

// ── API ───────────────────────────────────────────────────────────────────────
async function api(m,p,b) {
  const o={method:m,headers:{'Content-Type':'application/json','x-admin-token':T}};
  if(b) o.body=JSON.stringify(b);
  const r=await fetch(p,o);
  if(!r.ok) throw new Error(await r.text());
  if(r.status===204) return null;
  return r.json();
}

// ── Load ──────────────────────────────────────────────────────────────────────
function loadAll(){ loadStatus(); loadLinks(); loadQA(); loadInformation(); loadAnnouncements(); }

async function loadStatus() {
  try {
    const s=await api('GET','/api/status');
    document.getElementById('lc').textContent=s.link_count;
    document.getElementById('qc').textContent=s.qa_count;
    document.getElementById('ic').textContent=s.information_count;
    document.getElementById('ac').textContent=s.announcement_count;
    const hasRuns=s.wandb_active_runs&&s.wandb_active_runs.length;
    const runsDot=document.getElementById('runs-dot');
    if(hasRuns){ runsDot.className='dot dot-g'; }
    else if(s.wandb_stale){ runsDot.className='dot dot-w'; }
    else { runsDot.className='dot dot-d'; }
    document.getElementById('wb-runs').textContent=
      hasRuns ? s.wandb_active_runs.join(', ') : 'none yet';
    const dot=document.getElementById('wb-dot');
    const ts=document.getElementById('wb-ts');
    if(s.wandb_stale){ dot.className='dot dot-w'; ts.textContent='stale'; }
    else { dot.className='dot dot-g'; ts.textContent=s.wandb_last_updated||'ok'; }
  } catch{}
}

// ── Links ─────────────────────────────────────────────────────────────────────
let links=[];
async function loadLinks(){ try{ links=await api('GET','/api/links'); renderLinks(); }catch{} }

function renderLinks(){
  const el=document.getElementById('links-list');
  if(!links.length){ el.innerHTML='<div class="empty">no links yet — add your GitHub, wandb, docs URLs</div>'; return; }
  el.innerHTML=links.map(l=>`
    <div class="card" id="lc-${l.id}">
      <div class="card-body">
        <div class="card-label">${e(l.label)}</div>
        <a class="card-url" href="${e(l.url)}" target="_blank">${e(l.url)}</a>
        ${l.description?`<div class="card-desc">${e(l.description)}</div>`:''}
        <div class="card-meta">added ${l.added.slice(0,10)}</div>
        <div class="edit-form" id="le-${l.id}">
          <div class="frow">
            <div class="fg" style="max-width:160px"><label class="lbl">Label</label><input id="le-lb-${l.id}" value="${e(l.label)}"></div>
            <div class="fg"><label class="lbl">URL</label><input id="le-url-${l.id}" value="${e(l.url)}"></div>
          </div>
          <div class="frow"><div class="fg"><label class="lbl">Description</label><input id="le-desc-${l.id}" value="${e(l.description||'')}"></div></div>
          <div class="frow" style="justify-content:flex-end">
            <button class="btn btn-g" onclick="ce('le-${l.id}')">CANCEL</button>
            <button class="btn btn-p" onclick="saveLink('${l.id}')">SAVE</button>
          </div>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn btn-edt" onclick="oe('le-${l.id}')">EDIT</button>
        <button class="btn btn-del" onclick="delLink('${l.id}')">DEL</button>
      </div>
    </div>`).join('');
}

function tf(id){ document.getElementById(id).classList.toggle('open'); }
function oe(id){ document.getElementById(id).classList.add('open'); }
function ce(id){ document.getElementById(id).classList.remove('open'); }

async function submitLink(){
  const lb=v('lf-lb'), url=v('lf-url'), desc=v('lf-desc');
  if(!lb||!url){ toast('Label and URL required',1); return; }
  try{ await api('POST','/api/links',{label:lb,url,description:desc}); cl('lf-lb','lf-url','lf-desc'); tf('lf'); toast('Link saved'); loadLinks(); loadStatus(); }
  catch{ toast('Error saving',1); }
}
async function saveLink(id){
  await api('PATCH',`/api/links/${id}`,{label:v(`le-lb-${id}`),url:v(`le-url-${id}`),description:v(`le-desc-${id}`)});
  toast('Updated'); loadLinks();
}
async function delLink(id){
  if(!confirm('Delete this link?')) return;
  await api('DELETE',`/api/links/${id}`); toast('Removed'); loadLinks(); loadStatus();
}

// ── Q&A ───────────────────────────────────────────────────────────────────────
let qa=[];
async function loadQA(){ try{ qa=await api('GET','/api/qa'); renderQA(); }catch{} }

function renderQA(){
  const el=document.getElementById('qa-list');
  if(!qa.length){ el.innerHTML='<div class="empty">no q&a pairs yet</div>'; return; }
  el.innerHTML=qa.map(p=>`
    <div class="card" id="qc-${p.id}">
      <div class="card-body">
        <div class="card-q">Q: ${e(p.question)}</div>
        <div class="card-a">${e(p.answer)}</div>
        ${p.tags&&p.tags.length?`<div class="tags">${p.tags.map(t=>`<span class="tag">${e(t)}</span>`).join('')}</div>`:''}
        <div class="card-meta">added ${p.added.slice(0,10)}</div>
        <div class="edit-form" id="qe-${p.id}">
          <div class="frow"><div class="fg"><label class="lbl">Question</label><input id="qe-q-${p.id}" value="${e(p.question)}"></div></div>
          <div class="frow"><div class="fg"><label class="lbl">Answer</label><textarea id="qe-a-${p.id}">${e(p.answer)}</textarea></div></div>
          <div class="frow"><div class="fg"><label class="lbl">Tags</label><input id="qe-t-${p.id}" value="${(p.tags||[]).join(', ')}"></div></div>
          <div class="frow" style="justify-content:flex-end">
            <button class="btn btn-g" onclick="ce('qe-${p.id}')">CANCEL</button>
            <button class="btn btn-p" onclick="saveQA('${p.id}')">SAVE</button>
          </div>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn btn-edt" onclick="oe('qe-${p.id}')">EDIT</button>
        <button class="btn btn-del" onclick="delQA('${p.id}')">DEL</button>
      </div>
    </div>`).join('');
}

async function submitQA(){
  const q=v('qf-q'), a=v('qf-a'), tags=v('qf-t').split(',').map(s=>s.trim()).filter(Boolean);
  if(!q||!a){ toast('Question and answer required',1); return; }
  try{ await api('POST','/api/qa',{question:q,answer:a,tags}); cl('qf-q','qf-a','qf-t'); tf('qf'); toast('Q&A saved'); loadQA(); loadStatus(); }
  catch{ toast('Error saving',1); }
}
async function saveQA(id){
  const tags=v(`qe-t-${id}`).split(',').map(s=>s.trim()).filter(Boolean);
  await api('PATCH',`/api/qa/${id}`,{question:v(`qe-q-${id}`),answer:v(`qe-a-${id}`),tags});
  toast('Updated'); loadQA();
}
async function delQA(id){
  if(!confirm('Delete this Q&A?')) return;
  await api('DELETE',`/api/qa/${id}`); toast('Removed'); loadQA(); loadStatus();
}

// ── Information ──────────────────────────────────────────────────────────────
let information=[];
async function loadInformation(){ try{ information=await api('GET','/api/information'); renderInformation(); }catch{} }

function renderInformation(){
  const el=document.getElementById('information-list');
  if(!information.length){ el.innerHTML='<div class="empty">no information yet</div>'; return; }
  el.innerHTML=information.map(item=>`
    <div class="card" id="icard-${item.id}">
      <div class="card-body">
        <div class="card-a">${e(item.body)}</div>
        <div class="card-meta">added ${item.added.slice(0,10)}</div>
        <div class="edit-form" id="ie-${item.id}">
          <div class="frow"><div class="fg"><label class="lbl">Body</label><textarea id="ie-body-${item.id}">${e(item.body)}</textarea></div></div>
          <div class="frow" style="justify-content:flex-end">
            <button class="btn btn-g" onclick="ce('ie-${item.id}')">CANCEL</button>
            <button class="btn btn-p" onclick="saveInformation('${item.id}')">SAVE</button>
          </div>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn btn-edt" onclick="oe('ie-${item.id}')">EDIT</button>
        <button class="btn btn-del" onclick="delInformation('${item.id}')">DEL</button>
      </div>
    </div>`).join('');
}

async function submitInformation(){
  const body=v('if-body');
  if(!body){ toast('Body required',1); return; }
  try{ await api('POST','/api/information',{body}); cl('if-body'); tf('if'); toast('Information saved'); loadInformation(); loadStatus(); }
  catch{ toast('Error saving',1); }
}
async function saveInformation(id){
  await api('PATCH',`/api/information/${id}`,{
    body:v(`ie-body-${id}`)
  });
  toast('Updated'); loadInformation();
}
async function delInformation(id){
  if(!confirm('Delete this information?')) return;
  await api('DELETE',`/api/information/${id}`); toast('Removed'); loadInformation(); loadStatus();
}

// ── Announcements ─────────────────────────────────────────────────────────────
let announcements=[];
async function loadAnnouncements(){ try{ announcements=await api('GET','/api/announcements'); renderAnnouncements(); }catch{} }

function renderAnnouncements(){
  const el=document.getElementById('announcements-list');
  if(!announcements.length){ el.innerHTML='<div class="empty">no announcements yet</div>'; return; }
  el.innerHTML=announcements.map(a=>`
    <div class="card" id="acard-${a.id}">
      <div class="card-body">
        <div class="card-label">${e(a.title)} ${a.active?'<span class="tag">active</span>':'<span class="tag">inactive</span>'}</div>
        <div class="card-a">${e(a.body)}</div>
        <div class="card-meta">added ${a.added.slice(0,10)}</div>
        <div class="edit-form" id="ae-${a.id}">
          <div class="frow"><div class="fg"><label class="lbl">Title</label><input id="ae-title-${a.id}" value="${e(a.title)}"></div></div>
          <div class="frow"><div class="fg"><label class="lbl">Body</label><textarea id="ae-body-${a.id}">${e(a.body)}</textarea></div></div>
          <div class="frow">
            <label style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2);display:flex;align-items:center;gap:7px">
              <input type="checkbox" id="ae-active-${a.id}" ${a.active?'checked':''} style="width:auto"> ACTIVE
            </label>
          </div>
          <div class="frow" style="justify-content:flex-end">
            <button class="btn btn-g" onclick="ce('ae-${a.id}')">CANCEL</button>
            <button class="btn btn-p" onclick="saveAnnouncement('${a.id}')">SAVE</button>
          </div>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn btn-edt" onclick="oe('ae-${a.id}')">EDIT</button>
        <button class="btn btn-del" onclick="delAnnouncement('${a.id}')">DEL</button>
      </div>
    </div>`).join('');
}

async function submitAnnouncement(){
  const title=v('af-title'), body=v('af-body'), active=document.getElementById('af-active').checked;
  if(!title||!body){ toast('Title and body required',1); return; }
  try{ await api('POST','/api/announcements',{title,body,active}); cl('af-title','af-body'); document.getElementById('af-active').checked=true; tf('af'); toast('Announcement saved'); loadAnnouncements(); loadStatus(); }
  catch{ toast('Error saving',1); }
}
async function saveAnnouncement(id){
  await api('PATCH',`/api/announcements/${id}`,{
    title:v(`ae-title-${id}`),
    body:v(`ae-body-${id}`),
    active:document.getElementById(`ae-active-${id}`).checked
  });
  toast('Updated'); loadAnnouncements(); loadStatus();
}
async function delAnnouncement(id){
  if(!confirm('Delete this announcement?')) return;
  await api('DELETE',`/api/announcements/${id}`); toast('Removed'); loadAnnouncements(); loadStatus();
}

// ── Miners ────────────────────────────────────────────────────────────────────
async function loadMiners(){
  try{
    const s=await api('GET','/api/status');
    const tb=document.getElementById('mt-body');
    if(!s.top_miners||!s.top_miners.length){
      tb.innerHTML='<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text3)">no data yet — wandb poller initializing</td></tr>';
      return;
    }
    tb.innerHTML=s.top_miners.map(m=>`
      <tr class="r${m.rank}">
        <td>#${m.rank}</td><td>${m.uid}</td>
        <td class="sv">${m.avg_score}</td>
        <td>${m.last_score}</td><td>${m.records}</td>
      </tr>`).join('');
  }catch{}
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function tab(name,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`panel-${name}`).classList.add('active');
  if(name==='miners') loadMiners();
  if(name==='information') loadInformation();
  if(name==='announcements') loadAnnouncements();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function v(id){ return document.getElementById(id).value.trim(); }
function cl(...ids){ ids.forEach(id=>{ document.getElementById(id).value=''; }); }
function e(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let _tt;
function toast(msg,err){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='show'+(err?' err':'');
  clearTimeout(_tt); _tt=setTimeout(()=>t.className='',2400);
}

setInterval(()=>{ if(T) loadStatus(); },30000);
</script>
</body>
</html>
